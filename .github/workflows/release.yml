name: Release Spoons

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (without v prefix)"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Create build directory
        run: mkdir -p build

      - name: Make packaging script executable
        run: chmod +x .github/scripts/package_spoons.sh

      - name: Package Spoons
        run: .github/scripts/package_spoons.sh ${{ steps.version.outputs.VERSION }}

      - name: Verify build output
        run: |
          ls -la build/
          cat build/RELEASE.md

      - name: Create release notes
        run: |
          cat > build/release-notes.md << 'EOF'
          ## Hammerspoon Window Management Spoons v${{ steps.version.outputs.VERSION }}

          ### 📦 Included Spoons

          #### WindowQuickJump
          Jump to any window instantly with visual badges (1-9, A-Z).

          #### WindowCycle
          Cycle through windows and spaces seamlessly with keyboard shortcuts.

          #### WindowManager
          Advanced window manager with tiling layouts and fullscreen space management.

          ### 📥 Installation

          1. Download the desired `.spoon.zip` file below
          2. Double-click to install (Hammerspoon will automatically extract to `~/.hammerspoon/Spoons/`)
          3. Configure in your `init.lua` (see [README](https://github.com/AndrewDryga/spoons#readme) for examples)

          ### 🚀 Quick Start

          ```lua
          -- Load and configure all three Spoons
          hs.loadSpoon("WindowQuickJump")
          hs.loadSpoon("WindowCycle")
          hs.loadSpoon("WindowManager")

          -- Bind hotkeys
          spoon.WindowQuickJump:bindHotkeys({
              toggle = {{"cmd", "alt"}, "j"}
          }):start()

          spoon.WindowCycle:bindHotkeys({
              prev = {{"cmd", "alt"}, "left"},
              next = {{"cmd", "alt"}, "right"}
          }):start()

          -- See README for WindowManager configuration
          ```

          ### 📝 Checksums

          ```
          $(cat build/checksums.txt)
          ```

          ### 📖 Documentation

          Full documentation and examples: [GitHub Repository](https://github.com/AndrewDryga/spoons)

          ### 🐛 Issues & Support

          Report issues: [GitHub Issues](https://github.com/AndrewDryga/spoons/issues)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body_path: build/release-notes.md
          draft: false
          prerelease: false
          files: |
            build/WindowQuickJump.spoon.zip
            build/WindowCycle.spoon.zip
            build/WindowManager.spoon.zip
            build/checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spoons-v${{ steps.version.outputs.VERSION }}
          path: |
            build/*.zip
            build/checksums.txt
          retention-days: 30
