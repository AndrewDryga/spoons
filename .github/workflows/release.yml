name: Release Spoons

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (without v prefix)"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Create build directory
        run: mkdir -p build

      - name: Make packaging script executable
        run: chmod +x .github/scripts/package_spoons.sh

      - name: Package Spoons
        run: .github/scripts/package_spoons.sh ${{ steps.version.outputs.VERSION }}

      - name: Verify build output
        run: |
          ls -la build/
          cat build/RELEASE.md

      - name: Create release notes
        run: |
          # Read checksums if they exist
          if [ -f build/checksums.txt ]; then
              CHECKSUMS=$(cat build/checksums.txt)
          else
              CHECKSUMS="Checksums not available"
          fi

          # Create release notes with proper markdown
          cat > build/release-notes.md << 'ENDOFRELEASE'
          ### 📥 Installation

          1. Download the desired `.spoon.zip` file below
          2. Double-click to install (Hammerspoon will automatically extract to `~/.hammerspoon/Spoons/`)
          3. Configure in your `init.lua` (see [README](https://github.com/AndrewDryga/spoons#readme) for examples)

          ### 📝 Checksums

          ```
          ENDOFRELEASE

          # Append checksums
          echo "${CHECKSUMS}" >> build/release-notes.md

          # Append rest of release notes
          cat >> build/release-notes.md << 'ENDOFRELEASE'
          ```

          ### 📖 Documentation

          Full documentation and examples: [GitHub Repository](https://github.com/AndrewDryga/spoons)

          ### 🐛 Issues & Support

          Report issues: [GitHub Issues](https://github.com/AndrewDryga/spoons/issues)
          ENDOFRELEASE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body_path: build/release-notes.md
          draft: false
          prerelease: false
          files: |
            build/*.spoon.zip
            build/checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spoons-v${{ steps.version.outputs.VERSION }}
          path: |
            build/*.zip
            build/checksums.txt
          retention-days: 30
